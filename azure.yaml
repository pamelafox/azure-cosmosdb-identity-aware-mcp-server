# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: python-mcp-demo
metadata:
  template: python-mcp-demo@0.0.1

services:
  server:
    project: .
    language: docker
    host: containerapp
    docker:
      remoteBuild: true
      path: ./servers/Dockerfile
      context: .
hooks:
  preprovision:
    posix:
      shell: sh
      run: uv run python ./infra/auth_init.py
      continueOnError: true
      interactive: true
    windows:
      shell: pwsh
      run: uv run python ./infra/auth_init.py
      continueOnError: true
      interactive: true
  postprovision:
    posix:
      shell: sh
      run: ./infra/write_env.sh && uv run python ./infra/auth_postprovision.py
      continueOnError: true
      interactive: true
    windows:
      shell: pwsh
      run: ./infra/write_env.ps1; uv run python ./infra/auth_postprovision.py
      continueOnError: true
      interactive: true
